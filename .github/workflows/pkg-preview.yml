name: Package Preview

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    name: Publish PR Preview Packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Prepare Nuxt module
        run: cd packages/nuxt && vp run dev:prepare

      - name: Build packages
        run: vp run build

      - name: Publish preview packages
        run: vpx pkg-pr-new publish --compact --pnpm './packages/*'
